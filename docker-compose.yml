services:
  relay:
    build:
      context: .
      dockerfile: Dockerfile.relay
    image: codebuddy-remote-relay:latest
    restart: unless-stopped
    environment:
      CODEBUDDY_RELAY_HOST: 0.0.0.0
      CODEBUDDY_RELAY_PORT: 17330
      CODEBUDDY_RELAY_TOKEN: ${CODEBUDDY_RELAY_TOKEN:?set CODEBUDDY_RELAY_TOKEN}
    ports:
      - "127.0.0.1:17330:17330"
